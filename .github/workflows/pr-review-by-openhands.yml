---
name: PR Review by OpenHands

on:
    pull_request:
        types: [opened, ready_for_review, labeled, review_requested]

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    pr-review:
        # Only run for PRs from this repo (not forks) to access secrets
        # Triggers:
        #   - Non-draft PR opened
        #   - Draft PR marked ready for review
        #   - 'review-this' label added
        #   - Review requested from openhands-agent
        if: |
            github.event.pull_request.head.repo.full_name == github.repository &&
            (
                (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
                github.event.action == 'ready_for_review' ||
                (github.event.action == 'labeled' && github.event.label.name == 'review-this') ||
                (
                    github.event.action == 'review_requested' &&
                    github.event.requested_reviewer.login == 'openhands-agent'
                )
            )
        concurrency:
            group: pr-review-${{ github.event.pull_request.number }}
            cancel-in-progress: true
        runs-on: ubuntu-24.04
        steps:
            - name: Run PR Review
              uses: OpenHands/extensions/plugins/pr-review@main
              with:
                  llm-model: anthropic/claude-sonnet-4-5-20250929
                  review-style: roasted
                  llm-api-key: ${{ secrets.LLM_API_KEY }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
