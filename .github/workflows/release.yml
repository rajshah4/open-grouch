name: Release

# Trigger on version tags (v0.1.0, v1.0.0, etc.)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # Also match pre-release tags like v0.1.0-beta

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Extract version from tag
        id: version
        run: |
          # Get version from tag (strip 'v' prefix)
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Version: $VERSION"

      - name: Verify version matches pyproject.toml
        run: |
          TOML_VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$TOML_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) does not match pyproject.toml version ($TOML_VERSION)"
            echo "Please update pyproject.toml before tagging."
            exit 1
          fi
          echo "✅ Version match confirmed: $TOML_VERSION"

      - name: Build package
        run: |
          uv build
          ls -la dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "🗑️ Open Grouch ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --notes-start-tag "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')" \
            dist/*.whl dist/*.tar.gz

      - name: Add installation instructions to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get auto-generated notes and append our instructions
          CURRENT_BODY=$(gh release view ${{ steps.version.outputs.tag }} --json body -q '.body')
          
          gh release edit ${{ steps.version.outputs.tag }} --notes "${CURRENT_BODY}

          ---

          ## 🗑️ Installation

          **Install latest (recommended):**
          \`\`\`bash
          uv tool install git+https://github.com/${{ github.repository }}.git
          \`\`\`

          **Install this specific version:**
          \`\`\`bash
          uv tool install git+https://github.com/${{ github.repository }}.git@${{ steps.version.outputs.tag }}
          \`\`\`

          **From wheel:**
          \`\`\`bash
          # Download the .whl file from Assets below, then:
          uv tool install ./open_grouch-${{ steps.version.outputs.version }}-py3-none-any.whl
          \`\`\`

          ## Usage
          \`\`\`bash
          grouch              # Start the grouchy assistant
          grouch --help       # Get help (if you must)
          \`\`\`

          ---
          *Now scram! Unless you actually need something...* 🗑️"

      - name: Summary
        run: |
          echo "## 🗑️ Release ${{ steps.version.outputs.tag }} Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "uv tool install git+https://github.com/${{ github.repository }}.git@${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
