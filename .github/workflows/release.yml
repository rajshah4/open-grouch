name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: python
          package-name: open-grouch
          # Include our grouch prefix in changelog
          changelog-types: >
            [
              {"type": "feat", "section": "✨ Features", "hidden": false},
              {"type": "fix", "section": "🐛 Bug Fixes", "hidden": false},
              {"type": "grouch", "section": "🗑️ Grouch Personality", "hidden": false},
              {"type": "chore", "section": "🧹 Maintenance", "hidden": false},
              {"type": "docs", "section": "📚 Documentation", "hidden": false},
              {"type": "style", "section": "💅 Styles", "hidden": false},
              {"type": "refactor", "section": "♻️ Refactoring", "hidden": false},
              {"type": "perf", "section": "⚡ Performance", "hidden": false},
              {"type": "test", "section": "🧪 Tests", "hidden": false},
              {"type": "ci", "section": "🔧 CI/CD", "hidden": false},
              {"type": "sync", "section": "🔄 Upstream Sync", "hidden": false}
            ]

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Build package
        run: |
          uv build
          ls -la dist/

      - name: Upload wheel to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} dist/*.whl dist/*.tar.gz

      - name: Add installation instructions to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_BODY=$(gh release view ${{ needs.release-please.outputs.tag_name }} --json body -q '.body')
          
          gh release edit ${{ needs.release-please.outputs.tag_name }} --notes "${CURRENT_BODY}

          ---

          ## 🗑️ Installation

          **Install latest (recommended):**
          \`\`\`bash
          uv tool install git+https://github.com/${{ github.repository }}.git
          \`\`\`

          **Install this specific version:**
          \`\`\`bash
          uv tool install git+https://github.com/${{ github.repository }}.git@${{ needs.release-please.outputs.tag_name }}
          \`\`\`

          **From wheel:**
          \`\`\`bash
          # Download the .whl file from Assets below, then:
          uv tool install ./open_grouch-${{ needs.release-please.outputs.version }}-py3-none-any.whl
          \`\`\`

          ## Usage
          \`\`\`bash
          grouch              # Start the grouchy assistant
          grouch --help       # Get help (if you must)
          \`\`\`

          ---
          *Now scram! Unless you actually need something...* 🗑️"

      - name: Summary
        run: |
          echo "## 🗑️ Release ${{ needs.release-please.outputs.tag_name }} Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.release-please.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "uv tool install git+https://github.com/${{ github.repository }}.git" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
