name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Require conventional commit format for PR titles
          # PR title becomes the merge commit message when squash merging
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            grouch
            sync
          # Require a scope (optional)
          requireScope: false
          # Scopes allowed (optional - if empty, any scope is allowed)
          scopes: |
            tui
            cli
            theme
            strings
            release
            ci
            deps
          # Ensure subject doesn't start with uppercase
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject "{subject}" should start with a lowercase letter.
            
            Example: "feat: add grouchy welcome message"
          # Validate the entire PR title
          validateSingleCommit: false
          # Custom error message
          headerPattern: ^(\w+)(?:\(([^)]+)\))?!?:\s(.+)$
          headerPatternError: |
            PR title must follow Conventional Commits format:
            
            <type>[optional scope]: <description>
            
            Examples:
              feat: add grouchy welcome message
              fix(tui): correct banner alignment
              grouch: update Oscar personality strings
              sync: merge upstream changes
            
            Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert, grouch, sync
            
            Breaking changes: add "!" before colon (e.g., "feat!: remove deprecated API")
